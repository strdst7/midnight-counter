name: CI

# Compiles the Compact contract and runs the test suite on every push / PR.
# (Level 3 of the challenge expands on this pipeline.)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Compact toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf https://github.com/midnightntwrk/compact/releases/latest/download/compact-installer.sh | sh
          echo "$HOME/.compact/bin" >> "$GITHUB_PATH"

      - name: Select Compact compiler
        run: compact update

      - name: Compile contract
        run: npm run compile

      - name: Run tests
        run: npm test
